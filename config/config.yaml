# PLC 通信设置
PLC:
    plc_address: ""           # PLC 地址
    plc_port:                    # PLC 端口号
    timeout: 5000            # 通信超时时间 (ms) 
    read_cycle: 10           # PLC 读取周期（ms）

# RCS 接口设置
RCS:
    rcs_address: ""      # RCS 接口地址
    rcs_port:                   # RCS 端口号

# 视觉门配置
visiongate:
    vg_address: ""
    vg_port:

# 异常处理配置
exception:
    max_retry_count: 3          # 最大重试次数

